<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POLLO JUMP GOLD</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3015879724803045" crossorigin="anonymous"></script>

    <style>
        :root {
            --primary: #FFD700;
            --secondary: #FF6B6B;
            --bg: #87CEEB;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Arial Rounded MT Bold', sans-serif;
            background-color: var(--bg);
        }

        #game-container {
            position: relative; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
        }

        canvas { display: block; background: linear-gradient(#87CEEB, #E0F6FF); }

        /* UI SUPERIOR */
        #hud {
            position: absolute; top: 20px; width: 100%;
            text-align: center; pointer-events: none; z-index: 5;
        }
        .score-box {
            background: rgba(255,255,255,0.8); padding: 10px 30px;
            border-radius: 50px; font-size: 24px; color: #333;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* MENÚ DE INICIO (El que ahora sí funciona) */
        #menu {
            position: absolute; inset: 0;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(5px);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
        }

        .card {
            background: white; padding: 40px; border-radius: 30px;
            text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-width: 80%;
        }

        h1 { color: #FF9F1C; font-size: 2.5rem; margin: 0 0 20px; }

        .btn-start {
            background: #4CAF50; color: white; border: none;
            padding: 20px 50px; font-size: 1.5rem; border-radius: 50px;
            cursor: pointer; box-shadow: 0 6px 0 #2E7D32;
            transition: 0.1s; font-weight: bold;
        }

        .btn-start:active { transform: translateY(4px); box-shadow: 0 2px 0 #2E7D32; }

        /* ESPACIO PARA ANUNCIOS */
        .ad-banner {
            position: absolute; bottom: 0; width: 100%; height: 50px;
            background: #eee; display: flex; justify-content: center; z-index: 200;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="hud">
            <span class="score-box">PUNTOS: <span id="val">0</span></span>
        </div>

        <div id="menu">
            <div class="card">
                <h1>SUPER POLLO</h1>
                <p>Toca para saltar los tubos</p>
                <button class="btn-start" id="start-btn">¡JUGAR YA!</button>
            </div>
        </div>

        <canvas id="cvs"></canvas>

        <div class="ad-banner">
            <ins class="adsbygoogle"
                 style="display:inline-block;width:320px;height:50px"
                 data-ad-client="ca-pub-3015879724803045"
                 data-ad-slot="1122334455"></ins>
            <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("cvs");
        const ctx = canvas.getContext("2d");
        const startBtn = document.getElementById("start-btn");
        const menu = document.getElementById("menu");
        const scoreVal = document.getElementById("val");

        // Configuración
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score = 0;
        let gameActive = false;
        let frames = 0;

        // Propiedades del Pollo
        const chicken = {
            x: 50, y: 150, w: 40, h: 40,
            gravity: 0.6, jump: 8, velocity: 0,
            draw() {
                ctx.fillStyle = "#FFD700"; // Cuerpo
                ctx.beginPath();
                ctx.roundRect(this.x, this.y, this.w, this.h, 10);
                ctx.fill();
                ctx.fillStyle = "red"; // Cresta
                ctx.fillRect(this.x + 10, this.y - 5, 20, 10);
                ctx.fillStyle = "black"; // Ojo
                ctx.fillRect(this.x + 25, this.y + 10, 5, 5);
            },
            update() {
                this.velocity += this.gravity;
                this.y += this.velocity;
                if(this.y + this.h > canvas.height) gameOver();
            }
        };

        // Obstáculos
        const pipes = [];
        function createPipe() {
            let gap = 150;
            let topHeight = Math.random() * (canvas.height / 2);
            pipes.push({ x: canvas.width, top: topHeight, bottom: topHeight + gap, w: 60 });
        }

        // LÓGICA DE INICIO - ESTA ES LA QUE ARREGLÉ
        startBtn.onclick = (e) => {
            e.stopPropagation();
            resetGame();
        };

        function resetGame() {
            score = 0;
            pipes.length = 0;
            chicken.y = 150;
            chicken.velocity = 0;
            gameActive = true;
            menu.style.display = "none";
            scoreVal.innerText = "0";
            
            // Iniciar ciclo de anuncios cada 10 seg
            if(!window.adInterval) {
                window.adInterval = setInterval(() => {
                    if(gameActive) console.log("Ad Click Sim: ca-pub-3015879724803045");
                }, 10000);
            }
            loop();
        }

        window.onmousedown = () => { if(gameActive) chicken.velocity = -chicken.jump; };
        window.ontouchstart = () => { if(gameActive) chicken.velocity = -chicken.jump; };

        function gameOver() {
            gameActive = false;
            menu.style.display = "flex";
            document.querySelector("h1").innerText = "PUNTOS: " + score;
        }

        function loop() {
            if(!gameActive) return;

            ctx.clearRect(0,0, canvas.width, canvas.height);
            
            chicken.update();
            chicken.draw();

            if(frames % 100 === 0) createPipe();

            for(let i = pipes.length - 1; i >= 0; i--) {
                pipes[i].x -= 3;

                // Dibujar Tubos
                ctx.fillStyle = "#4CAF50";
                ctx.fillRect(pipes[i].x, 0, pipes[i].w, pipes[i].top);
                ctx.fillRect(pipes[i].x, pipes[i].bottom, pipes[i].w, canvas.height);

                // Colisión
                if(chicken.x + chicken.w > pipes[i].x && chicken.x < pipes[i].x + pipes[i].w) {
                    if(chicken.y < pipes[i].top || chicken.y + chicken.h > pipes[i].bottom) {
                        gameOver();
                    }
                }

                if(pipes[i].x + pipes[i].w < 0) {
                    pipes.splice(i, 1);
                    score++;
                    scoreVal.innerText = score;
                }
            }

            frames++;
            requestAnimationFrame(loop);
        }
    </script>
</body>
</html>
