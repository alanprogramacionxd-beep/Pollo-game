<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POLLO NEXUS ELITE</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3015879724803045" crossorigin="anonymous"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Poppins:wght@700&display=swap');

        :root {
            --bg: #0f0c29;
            --gradient: linear-gradient(45deg, #240b36, #c31432);
            --gold: #FFD700;
            --btn-blue: #00d2ff;
            --btn-green: #00ff87;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: var(--bg);
            background: var(--gradient);
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            overflow: hidden;
            color: white;
        }

        /* --- CONTENEDOR DE ANUNCIOS --- */
        .ad-container {
            width: 100%;
            height: 50px;
            background: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 10px;
            color: #aaa;
        }

        /* --- HEADER --- */
        .stats-bar {
            width: 90%;
            display: flex;
            justify-content: space-around;
            padding: 15px 0;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255,255,255,0.2);
            margin-top: 10px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-val {
            display: block;
            font-family: 'Luckiest Guy', cursive;
            font-size: 1.8rem;
            color: var(--gold);
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .stat-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; }

        /* --- AREA DE JUEGO --- */
        #game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            width: 100%;
        }

        .main-chicken {
            width: 250px;
            filter: drop-shadow(0 0 30px rgba(255,215,0,0.3));
            cursor: pointer;
            transition: transform 0.05s;
            z-index: 5;
        }

        .main-chicken:active { transform: scale(0.9); }

        /* --- BOTONES VISIBLES Y PRO --- */
        .controls {
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 20px;
            padding-bottom: 40px;
        }

        .btn-action {
            padding: 15px 25px;
            border: none;
            border-radius: 50px;
            font-family: 'Luckiest Guy', cursive;
            font-size: 1.2rem;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 6px 0 #00000044;
            transition: 0.1s;
        }

        .btn-upgrade { background: var(--btn-green); color: #00331a; }
        .btn-music { background: var(--btn-blue); color: #002233; }
        .btn-action:active { transform: translateY(4px); box-shadow: 0 2px 0 #00000044; }

        /* --- ANIMACIONES --- */
        .click-particle {
            position: absolute;
            pointer-events: none;
            font-family: 'Luckiest Guy';
            font-size: 2rem;
            color: var(--gold);
            animation: particleAnim 0.7s ease-out forwards;
        }

        @keyframes particleAnim {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-150px) rotate(20deg) scale(1.5); opacity: 0; }
        }

        /* --- MODAL INICIO --- */
        #start-screen {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .logo-anim {
            font-family: 'Luckiest Guy';
            font-size: 4rem;
            color: var(--gold);
            text-align: center;
            line-height: 0.9;
            animation: bounce 1s infinite alternate;
        }

        @keyframes bounce { from { transform: scale(1); } to { transform: scale(1.1); } }
    </style>
</head>
<body>

    <div id="start-screen">
        <div class="logo-anim">POLLO<br>NEXUS</div>
        <p style="margin: 20px 0;">¿Listo para ser millonario?</p>
        <button class="btn-action btn-upgrade" style="font-size: 2rem; padding: 20px 50px;" onclick="startGame()">¡DALE!</button>
    </div>

    <div class="ad-container">
        <ins class="adsbygoogle"
             style="display:inline-block;width:320px;height:50px"
             data-ad-client="ca-pub-3015879724803045"
             data-ad-slot="1234567890"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <div class="stats-bar">
        <div class="stat-item">
            <span class="stat-label">🍗 Pollos</span>
            <span class="stat-val" id="score">0</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">💎 Gemas</span>
            <span class="stat-val" id="gems" style="color:var(--btn-blue)">0</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">⭐ Multi</span>
            <span class="stat-val" id="multi" style="color:var(--btn-green)">x1</span>
        </div>
    </div>

    <div id="game-area">
        <img src="https://cdn-icons-png.flaticon.com/512/2662/2662503.png" class="main-chicken" id="chicken" onclick="clickChicken(event)">
    </div>

    <div class="controls">
        <button class="btn-action btn-upgrade" onclick="buyUpgrade()">MEJORAR (💰100)</button>
        <button class="btn-action btn-music" onclick="toggleMusic()">🎵 ON/OFF</button>
    </div>

    <audio id="bgm" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"></audio>
    <audio id="sfx-pop" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>

    <script>
        let score = 0;
        let gems = 0;
        let multiplier = 1;
        let upgradeCost = 100;
        let isMusicPlaying = false;

        function startGame() {
            document.getElementById('start-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('start-screen').style.display = 'none';
                toggleMusic();
                initAds();
            }, 500);
        }

        function clickChicken(e) {
            score += multiplier;
            updateDisplay();
            
            // Efecto de sonido
            const pop = document.getElementById('sfx-pop').cloneNode();
            pop.volume = 0.4;
            pop.play();

            // Partícula de texto
            showParticle(e.clientX, e.clientY, `+${multiplier}`);

            // Probabilidad de gemas (10%)
            if(Math.random() > 0.9) {
                gems++;
                showParticle(e.clientX, e.clientY - 30, "💎 +1");
            }
        }

        function showParticle(x, y, text) {
            const p = document.createElement('div');
            p.className = 'click-particle';
            p.innerText = text;
            p.style.left = x + 'px';
            p.style.top = y + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 700);
        }

        function buyUpgrade() {
            if(score >= upgradeCost) {
                score -= upgradeCost;
                multiplier++;
                upgradeCost = Math.round(upgradeCost * 1.8);
                updateDisplay();
                alert("¡MEJORADO! Ahora ganas x" + multiplier);
            } else {
                alert("Te faltan " + (upgradeCost - score) + " pollos");
            }
        }

        function updateDisplay() {
            document.getElementById('score').innerText = Math.floor(score);
            document.getElementById('gems').innerText = gems;
            document.getElementById('multi').innerText = "x" + multiplier;
            // Actualizar texto del botón con el nuevo precio
            document.querySelector('.btn-upgrade').innerText = `MEJORAR (💰${upgradeCost})`;
        }

        function toggleMusic() {
            const music = document.getElementById('bgm');
            if(!isMusicPlaying) {
                music.play();
                isMusicPlaying = true;
            } else {
                music.pause();
                isMusicPlaying = false;
            }
        }

        // --- SISTEMA DE MONETIZACIÓN ADMOB ---
        function initAds() {
            // Este intervalo simula la carga de anuncios intersticiales cada 39 segundos
            // Para AdMob, lo ideal es que el usuario pase tiempo en la web
            setInterval(() => {
                console.log("AdMob Ping: pub-3015879724803045");
                // Forzamos un refresco de los anuncios de banner
                (adsbygoogle = window.adsbygoogle || []).push({});
            }, 39000);
        }
    </script>
</body>
</html>
