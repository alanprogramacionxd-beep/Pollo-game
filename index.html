<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POLLO BREAKER ELITE</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3015879724803045" crossorigin="anonymous"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap');

        :root {
            --neon-green: #39FF14;
            --neon-red: #FF3131;
            --dark-bg: #0a0a0a;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; background: var(--dark-bg);
            font-family: 'Montserrat', sans-serif; color: white;
        }

        /* --- UI DE LUJO --- */
        #ui-container {
            position: absolute; top: 0; width: 100%; padding: 15px;
            display: flex; justify-content: space-between; z-index: 10;
            background: rgba(0,0,0,0.3); backdrop-filter: blur(5px);
        }

        .stat { font-size: 1.2rem; color: var(--neon-green); text-shadow: 0 0 10px var(--neon-green); }

        /* --- MENÚ INICIO --- */
        .overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; text-align: center;
        }

        .title { font-size: 3rem; color: var(--neon-red); margin-bottom: 20px; letter-spacing: 5px; }

        .btn-main {
            padding: 20px 60px; font-size: 1.5rem; border: none; border-radius: 15px;
            background: var(--neon-green); color: black; font-weight: 900;
            cursor: pointer; box-shadow: 0 0 20px var(--neon-green); transition: 0.2s;
        }

        .btn-main:active { transform: scale(0.9); }

        /* --- TIENDA DE MEJORAS --- */
        #shop { display: none; }
        .shop-item {
            background: rgba(255,255,255,0.1); padding: 15px; margin: 10px;
            border-radius: 10px; border: 1px solid var(--neon-green); width: 250px;
        }

        canvas { display: block; }

        /* ANUNCIO INFERIOR */
        #ad-box {
            position: absolute; bottom: 0; width: 100%; height: 50px;
            background: #111; display: flex; justify-content: center;
        }
    </style>
</head>
<body>

    <div id="ui-container">
        <div class="stat">PUNTOS: <span id="score">0</span></div>
        <div class="stat" style="color:var(--neon-red)">MONEDAS: <span id="coins">0</span></div>
    </div>

    <div id="start-menu" class="overlay">
        <h1 class="title">POLLO<br>BREAKER</h1>
        <button class="btn-main" onclick="startGame()">¡DESTRUIR!</button>
        <button class="btn-main" style="background:var(--neon-red); margin-top:20px; box-shadow: 0 0 20px var(--neon-red);" onclick="openShop()">TIENDA</button>
    </div>

    <div id="shop" class="overlay">
        <h2 style="color:var(--neon-green)">MEJORAS PRO</h2>
        <div class="shop-item">
            <p>Super Bola (+Potencia)</p>
            <button onclick="buyUpgrade(50)">COMPRAR (50 💰)</button>
        </div>
        <div class="shop-item">
            <p>Raqueta Gigante</p>
            <button onclick="buyUpgrade(100)">COMPRAR (100 💰)</button>
        </div>
        <button class="btn-main" style="font-size:1rem; padding:10px; margin-top:20px;" onclick="closeShop()">VOLVER</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="ad-box">
        <ins class="adsbygoogle"
             style="display:inline-block;width:320px;height:50px"
             data-ad-client="ca-pub-3015879724803045"
             data-ad-slot="5566778899"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let score = 0;
        let coins = parseInt(localStorage.getItem('coins_breaker')) || 0;
        let gameRunning = false;
        let paddleWidth = 100;
        document.getElementById('coins').innerText = coins;

        const ball = { x: canvas.width/2, y: canvas.height-50, dx: 4, dy: -4, radius: 8 };
        const paddle = { h: 15, x: (canvas.width-paddleWidth)/2 };

        // Configuración de Bloques
        const rowCount = 6;
        const colCount = 5;
        const bricks = [];
        function initBricks() {
            for(let c=0; c<colCount; c++) {
                bricks[c] = [];
                for(let r=0; r<rowCount; r++) {
                    bricks[c][r] = { x: 0, y: 0, status: 1 };
                }
            }
        }

        // Controles Táctiles
        window.ontouchmove = (e) => {
            let relativeX = e.touches[0].clientX - canvas.offsetLeft;
            if(relativeX > 0 && relativeX < canvas.width) {
                paddle.x = relativeX - paddleWidth/2;
            }
        };

        function startGame() {
            document.getElementById('start-menu').style.display = 'none';
            initBricks();
            gameRunning = true;
            ball.x = canvas.width/2; ball.y = canvas.height-50;
            ball.dy = -4; score = 0;
            draw();
            
            // Ciclo de Anuncios cada 10 seg
            setInterval(() => {
                if(gameRunning) console.log("Ad Refresh: ca-pub-3015879724803045");
            }, 10000);
        }

        function openShop() { document.getElementById('shop').style.display = 'flex'; }
        function closeShop() { document.getElementById('shop').style.display = 'none'; }

        function buyUpgrade(cost) {
            if(coins >= cost) {
                coins -= cost;
                paddleWidth += 20; // Mejora real
                localStorage.setItem('coins_breaker', coins);
                document.getElementById('coins').innerText = coins;
                alert("¡MEJORADO! Tu raqueta es más grande.");
            } else { alert("Faltan monedas."); }
        }

        function draw() {
            if(!gameRunning) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Dibujar Bloques Neón
            for(let c=0; c<colCount; c++) {
                for(let r=0; r<rowCount; r++) {
                    if(bricks[c][r].status === 1) {
                        let bX = (c*(canvas.width/colCount)) + 5;
                        let bY = (r*30) + 80;
                        bricks[c][r].x = bX;
                        bricks[c][r].y = bY;
                        ctx.fillStyle = r % 2 === 0 ? var(--neon-green) : var(--neon-red);
                        ctx.roundRect(bX, bY, (canvas.width/colCount)-10, 20, 5);
                        ctx.fill();

                        // Colisión Bola-Bloque
                        if(ball.x > bX && ball.x < bX+(canvas.width/colCount) && ball.y > bY && ball.y < bY+20) {
                            ball.dy = -ball.dy;
                            bricks[c][r].status = 0;
                            score += 10;
                            coins++;
                            document.getElementById('score').innerText = score;
                            document.getElementById('coins').innerText = coins;
                            localStorage.setItem('coins_breaker', coins);
                        }
                    }
                }
            }

            // Dibujar Bola y Raqueta
            ctx.fillStyle = "white";
            ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = var(--neon-green);
            ctx.fillRect(paddle.x, canvas.height-40, paddleWidth, paddle.h);

            // Rebotes
            if(ball.x + ball.dx > canvas.width || ball.x + ball.dx < 0) ball.dx = -ball.dx;
            if(ball.y + ball.dy < 0) ball.dy = -ball.dy;
            else if(ball.y + ball.dy > canvas.height-40) {
                if(ball.x > paddle.x && ball.x < paddle.x + paddleWidth) ball.dy = -ball.dy;
                else gameOver();
            }

            ball.x += ball.dx; ball.y += ball.dy;
            requestAnimationFrame(draw);
        }

        function gameOver() {
            gameRunning = false;
            alert("¡GAME OVER! Puntos: " + score);
            document.getElementById('start-menu').style.display = 'flex';
        }
    </script>
</body>
</html>
