<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POLLO PREMIUM | Generador</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3015879724803045" crossorigin="anonymous"></script>

    <style>
        :root {
            --fondo: #050505;
            --cian: #00f2ff;
            --violeta: #bc13fe;
            --tarjeta: #121212;
            --curva: 35px;
        }

        body {
            background-color: var(--fondo);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .app-container {
            background: var(--tarjeta);
            width: 90%;
            max-width: 400px;
            padding: 30px;
            border-radius: var(--curva);
            border: 2px solid var(--cian);
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.2);
            text-align: center;
        }

        h1 {
            color: var(--cian);
            text-shadow: 0 0 10px var(--cian);
            font-size: 1.8rem;
            margin-bottom: 20px;
        }

        /* Espacio para el Anuncio */
        .ad-slot {
            background: #1a1a1a;
            width: 100%;
            height: 100px;
            margin: 20px 0;
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            color: #444;
            border: 1px dashed #333;
        }

        .status-box {
            background: #000;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            border-left: 5px solid var(--violeta);
        }

        #timer-text {
            font-size: 1.1rem;
            color: var(--violeta);
            font-weight: bold;
        }

        /* Botón Estilo Neón */
        .btn-action {
            background: linear-gradient(45deg, var(--cian), var(--violeta));
            border: none;
            color: white;
            width: 100%;
            padding: 18px;
            border-radius: var(--curva);
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-action:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            filter: grayscale(1);
        }

        /* Barra de Progreso */
        .barra-fondo {
            width: 100%;
            height: 10px;
            background: #222;
            border-radius: 50px;
            margin-top: 15px;
            overflow: hidden;
        }

        .barra-progreso {
            width: 0%;
            height: 100%;
            background: var(--cian);
            box-shadow: 0 0 10px var(--cian);
            transition: width 1s linear;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <h1>POLLO VAULT 💎</h1>
        
        <div class="status-box">
            <div id="timer-text">Listo para generar...</div>
            <div class="barra-fondo">
                <div class="barra-progreso" id="p-bar"></div>
            </div>
        </div>

        <div class="ad-slot">
            <ins class="adsbygoogle"
                 style="display:block"
                 data-ad-client="ca-pub-3015879724803045"
                 data-ad-slot="AUTO"
                 data-ad-format="auto"
                 data-full-width-responsive="true"></ins>
            <script> (adsbygoogle = window.adsbygoogle || []).push({}); </script>
        </div>

        <button class="btn-action" id="mainBtn" onclick="iniciarProceso()">
            GENERAR CÓDIGO (20s)
        </button>

        <p style="font-size: 0.7rem; color: #555; margin-top: 15px;">
            ID: pub-3015879724803045 | Pollogame System
        </p>
    </div>

    <script>
        function iniciarProceso() {
            const btn = document.getElementById('mainBtn');
            const txt = document.getElementById('timer-text');
            const bar = document.getElementById('p-bar');
            
            btn.disabled = true;
            let tiempo = 20;
            
            let p = 0;
            const intervalo = setInterval(() => {
                tiempo--;
                p += 5; // Sube 5% cada segundo para llegar a 100 en 20s
                bar.style.width = p + '%';
                txt.innerText = "Generando en " + tiempo + "s...";

                if (tiempo <= 0) {
                    clearInterval(intervalo);
                    const codigo = "POLLO-" + Math.random().toString(36).substring(2, 9).toUpperCase();
                    txt.innerHTML = "CÓDIGO: <span style='color:white'>" + codigo + "</span>";
                    btn.disabled = false;
                    btn.innerText = "GENERAR OTRO";
                    bar.style.width = '0%';
                    
                    // Alerta estética
                    alert("¡Código Generado Exitosamente!");
                }
            }, 1000);
        }
    </script>
</body>
</html>
