<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>POLLO GALAXY PRO</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3015879724803045" crossorigin="anonymous"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');

        :root {
            --neon-blue: #00f3ff;
            --neon-pink: #ff00ff;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background: #050505;
            font-family: 'Orbitron', sans-serif;
            color: white;
            user-select: none;
            touch-action: none;
        }

        /* --- UI LAYER --- */
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .hud {
            display: flex; justify-content: space-between;
            padding: 20px; font-size: 1.2rem;
            text-shadow: 0 0 10px var(--neon-blue);
        }

        /* --- MENÚS --- */
        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 100;
            pointer-events: all;
        }

        .glass-card {
            background: var(--glass);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.2);
            text-align: center;
            box-shadow: 0 0 50px rgba(0, 243, 255, 0.2);
        }

        h1 { font-size: 3rem; margin: 0; background: linear-gradient(to right, var(--neon-blue), var(--neon-pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .btn-pro {
            margin-top: 20px;
            padding: 15px 40px;
            background: var(--neon-blue);
            border: none; border-radius: 50px;
            font-family: 'Orbitron'; font-weight: 900;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 20px var(--neon-blue);
        }

        .btn-pro:active { transform: scale(0.9); }

        /* --- AD MODAL (EL DINERO) --- */
        #ad-modal {
            display: none;
            background: #000;
            z-index: 1000;
        }

        /* --- CANVAS JUEGO --- */
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div class="hud">
            <div>PUNTOS: <span id="score-val">0</span></div>
            <div style="color: var(--neon-pink)">NIVEL: <span id="lv-val">1</span></div>
        </div>
    </div>

    <div id="menu-screen" class="overlay">
        <div class="glass-card">
            <h1>POLLO<br>GALAXY</h1>
            <p>ESQUIVA Y GANA DINERO</p>
            <button class="btn-pro" onclick="startGame()">INICIAR MISIÓN</button>
        </div>
    </div>

    <div id="ad-modal" class="overlay">
        <div class="glass-card">
            <p style="font-size: 0.8rem; color: #666;">PUBLICIDAD GOOGLE</p>
            <ins class="adsbygoogle"
                 style="display:block;width:300px;height:250px"
                 data-ad-client="ca-pub-3015879724803045"
                 data-ad-slot="9876543210"></ins>
            <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
            <p id="ad-timer">Cerrando en 3...</p>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreEl = document.getElementById('score-val');
        
        let gameRunning = false;
        let score = 0;
        let level = 1;
        let adCounter = 0;

        // Ajustar canvas al cel
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        // Propiedades del Pollo
        const player = {
            x: canvas.width / 2,
            y: canvas.height - 100,
            size: 40,
            color: '#00f3ff',
            targetX: canvas.width / 2
        };

        // Enemigos
        const enemies = [];
        const particles = [];

        // Control táctil
        window.addEventListener('touchstart', (e) => {
            player.targetX = e.touches[0].clientX;
        });
        window.addEventListener('touchmove', (e) => {
            player.targetX = e.touches[0].clientX;
        });

        function startGame() {
            document.getElementById('menu-screen').style.display = 'none';
            gameRunning = true;
            score = 0;
            level = 1;
            enemies.length = 0;
            loop();
            startAdTimer();
        }

        // --- EL GENERADOR DE DINERO (Anuncios cada 10s) ---
        function startAdTimer() {
            setInterval(() => {
                if(gameRunning) {
                    showAd();
                }
            }, 10000); // 10 Segundos exactos
        }

        function showAd() {
            const modal = document.getElementById('ad-modal');
            modal.style.display = 'flex';
            let timeLeft = 3;
            
            const countdown = setInterval(() => {
                timeLeft--;
                document.getElementById('ad-timer').innerText = `Cerrando en ${timeLeft}...`;
                if(timeLeft <= 0) {
                    clearInterval(countdown);
                    modal.style.display = 'none';
                    (adsbygoogle = window.adsbygoogle || []).push({}); // Recargar anuncio
                }
            }, 1000);
        }

        function spawnEnemy() {
            if(Math.random() < 0.05 + (level * 0.01)) {
                enemies.push({
                    x: Math.random() * canvas.width,
                    y: -50,
                    size: 20 + Math.random() * 30,
                    speed: 3 + (level * 0.5)
                });
            }
        }

        function update() {
            // Movimiento suave del jugador
            player.x += (player.targetX - player.x) * 0.15;

            // Enemigos
            for(let i = enemies.length - 1; i >= 0; i--) {
                enemies[i].y += enemies[i].speed;
                
                // Colisión
                const dx = player.x - enemies[i].x;
                const dy = player.y - enemies[i].y;
                const distance = Math.sqrt(dx*dx + dy*dy);

                if(distance < player.size/2 + enemies[i].size/2) {
                    gameOver();
                }

                if(enemies[i].y > canvas.height) {
                    enemies.splice(i, 1);
                    score += 10;
                    scoreEl.innerText = score;
                    if(score % 500 === 0) {
                        level++;
                        document.getElementById('lv-val').innerText = level;
                    }
                }
            }
            spawnEnemy();
        }

        function draw() {
            // Fondo Espacial
            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Estrellas
            ctx.fillStyle = '#ffffff22';
            for(let i=0; i<20; i++) ctx.fillRect(Math.random()*canvas.width, Math.random()*canvas.height, 2, 2);

            // Dibujar Jugador (Pollo Neón)
            ctx.shadowBlur = 15;
            ctx.shadowColor = var(--neon-blue);
            ctx.fillStyle = player.color;
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.size/2, 0, Math.PI*2);
            ctx.fill();

            // Dibujar Enemigos (Meteoritos)
            ctx.shadowColor = var(--neon-pink);
            ctx.fillStyle = var(--neon-pink);
            enemies.forEach(en => {
                ctx.beginPath();
                ctx.rect(en.x, en.y, en.size, en.size);
                ctx.fill();
            });
            ctx.shadowBlur = 0;
        }

        function loop() {
            if(!gameRunning) return;
            update();
            draw();
            requestAnimationFrame(loop);
        }

        function gameOver() {
            gameRunning = false;
            alert("¡GAME OVER! Puntos: " + score);
            document.getElementById('menu-screen').style.display = 'flex';
        }
    </script>
</body>
</html>
