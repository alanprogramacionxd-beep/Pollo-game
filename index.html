<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Chicken Evolution Pro</title>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3015879724803045" crossorigin="anonymous"></script>
    <style>
        :root {
            --primary: #ffcc00;
            --secondary: #2c3e50;
            --accent: #e74c3c;
            --bg: #0f0f0f;
            --ui-curve: 25px;
        }

        body {
            margin: 0;
            background: var(--bg);
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* Pantalla de Carga */
        #loading-screen {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .loader-bar {
            width: 250px;
            height: 15px;
            background: #333;
            border-radius: 10px;
            margin-top: 20px;
            overflow: hidden;
        }

        .loader-fill {
            width: 0%;
            height: 100%;
            background: var(--primary);
            transition: width 0.3s;
        }

        /* Menú Inicio */
        #start-menu {
            text-align: center;
            background: rgba(44, 62, 80, 0.9);
            padding: 40px;
            border-radius: var(--ui-curve);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .btn-ui {
            background: var(--primary);
            border: none;
            padding: 15px 40px;
            border-radius: var(--ui-curve);
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-ui:active { transform: scale(0.95); }

        /* Interfaz del Juego */
        #game-ui { display: none; text-align: center; width: 100%; max-width: 400px; }

        .stat-container {
            display: flex;
            justify-content: space-around;
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: var(--ui-curve);
            margin-bottom: 20px;
        }

        .pollo-btn {
            width: 180px;
            cursor: pointer;
            transition: transform 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .pollo-btn:active { transform: scale(1.3) rotate(5deg); }

        /* Ajustes UI */
        #settings-panel {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #1a1a1a;
            padding: 30px;
            border-radius: var(--ui-curve);
            border: 2px solid var(--primary);
        }
    </style>
</head>
<body>

    <div id="loading-screen">
        <h1 style="color: var(--primary)">NEXUS CHICKEN</h1>
        <div class="loader-bar"><div class="loader-fill" id="fill"></div></div>
    </div>

    <div id="start-menu" style="display:none">
        <h2>Bienvenido</h2>
        <button class="btn-ui" onclick="startGame()">JUGAR</button>
    </div>

    <div id="game-ui">
        <div class="stat-container">
            <div>🍗 <span id="pollos">0</span></div>
            <div>💎 <span id="gemas">0</span></div>
            <div>LVL: <span id="nivel">1</span></div>
        </div>

        <img src="https://cdn-icons-png.flaticon.com/512/2311/2311039.png" class="pollo-btn" onclick="clickPollo()" alt="Pollo">
        
        <div style="margin-top: 40px;">
            <button class="btn-ui" style="background: #3498db" onclick="toggleSettings()">AJUSTES</button>
        </div>
    </div>

    <div id="settings-panel">
        <h3>Configuración</h3>
        <p>Música: <input type="range" min="0" max="100" onchange="adjustVol(this.value)"></p>
        <button class="btn-ui" style="padding: 10px 20px" onclick="toggleSettings()">CERRAR</button>
    </div>

    <audio id="bgMusic" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

    <script>
        let pollos = 0;
        let gemas = 0;
        let nivel = 1;
        let power = 1;

        // Simular Carga
        window.onload = () => {
            let fill = document.getElementById('fill');
            let width = 0;
            let interval = setInterval(() => {
                if(width >= 100){
                    clearInterval(interval);
                    document.getElementById('loading-screen').style.display = 'none';
                    document.getElementById('start-menu').style.display = 'block';
                } else {
                    width += 5;
                    fill.style.width = width + '%';
                }
            }, 100);
        };

        function startGame() {
            document.getElementById('start-menu').style.display = 'none';
            document.getElementById('game-ui').style.display = 'block';
            document.getElementById('bgMusic').play();
            startAds(); // Iniciar ciclo de anuncios
        }

        function clickPollo() {
            pollos += power;
            document.getElementById('pollos').innerText = pollos;
            if(pollos % 100 === 0) {
                gemas += 1;
                nivel += 1;
                power += 1;
                document.getElementById('gemas').innerText = gemas;
                document.getElementById('nivel').innerText = nivel;
            }
        }

        function toggleSettings() {
            let panel = document.getElementById('settings-panel');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        }

        function adjustVol(v) {
            document.getElementById('bgMusic').volume = v / 100;
        }

        // LÓGICA DE ANUNCIOS CADA 39 SEGUNDOS
        function startAds() {
            setInterval(() => {
                alert("CARGANDO ANUNCIO DE RECOMPENSA... (Aquí aparecerá el Ad de tu cuenta pub-3015879724803045)");
                // Aquí el script de AdMob detectará la actividad y sumará a tu cuenta
            }, 39000);
        }
    </script>
</body>
</html>
